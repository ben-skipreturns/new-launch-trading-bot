services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moonshot
      POSTGRES_USER: moonshot
      POSTGRES_PASSWORD: moonshot
    ports:
      - "5433:5432"
    volumes:
      - moonshot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonshot -d moonshot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moonshot-postgres:
